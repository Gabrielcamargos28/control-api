services:
  db:
    image: postgres:15
    container_name: controlapi-db
    environment:
      POSTGRES_DB: controlapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./ControlApi
      dockerfile: Dockerfile
    container_name: controlapi-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/controlapi
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ./ControlApi-UI
      dockerfile: Dockerfile
    container_name: controlapi-ui
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
